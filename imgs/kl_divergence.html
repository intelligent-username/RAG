<style>

    #page-title {

  #kl-legend {

<div id="page-title">KL Divergence Demo</div>
<div id="kl-legend">
  <div class="kl-leg-item"><span class="kl-swatch" style="background:#00d9ff"></span>P : target</div>
  <div class="kl-leg-item"><span class="kl-swatch" style="background:#ff4d6d"></span>Q = f(x|θ)</div>
  <div class="kl-leg-item"><span class="kl-swatch" style="background:#39ff14"></span>F(x|θ,c)</div>
  <div class="kl-leg-item"><span class="kl-swatch" style="background:#ffb700"></span>P·log(P/Q)</div>
  <div class="kl-leg-item"><span class="kl-swatch" style="background:#c77dff"></span>Q·log(Q/P)</div>
  <div class="kl-leg-item"><span class="kl-swatch" style="background:#00ff9f"></span>P·log(P/F)</div>
</div>

<div id="kl-controls">
  <div class="kl-group-label" style="color:#00d9ff">P : true distribution</div>
  <div class="kl-group-label" style="color:#ff4d6d">Q = f(x|θ) : base model</div>

  <div class="kl-row">
    <label>μ<sub>P</sub></label>
    <input type="range" id="mu_p" min="-3" max="3" step="0.1" value="0">
    <span id="lbl-mu_p">0.0</span>
  </div>
  <div class="kl-row">
    <label>μ<sub>Q</sub></label>
    <input type="range" id="mu_q" min="-3" max="3" step="0.1" value="1">
    <span id="lbl-mu_q">1.0</span>
  </div>
  <div class="kl-row">
    <label>σ<sub>P</sub></label>
    <input type="range" id="sig_p" min="0.2" max="3" step="0.1" value="1">
    <span id="lbl-sig_p">1.0</span>
  </div>
  <div class="kl-row">
    <label>σ<sub>Q</sub></label>
    <input type="range" id="sig_q" min="0.2" max="3" step="0.1" value="1.5">
    <span id="lbl-sig_q">1.5</span>
  </div>

  <div class="rag-row">
    <input type="checkbox" id="rag-toggle">
    <label for="rag-toggle">&nbsp RAG context <em>c</em> &nbsp;&nbsp; F(x|θ,c)</label>
    <div id="rag-strength-wrap">
      <label>context weight λ</label>
      <input type="range" id="rag-lambda" min="-0.1" max="1.1" step="0.05" value="0.5" disabled>
      <span id="lbl-lambda" style="color:#8b949e; font-variant-numeric:tabular-nums; min-width:32px; text-align:right;">0.50</span>
    </div>
  </div>
</div>

<script>
(function () {
  const N = 600, xmin = -6, xmax = 6;
  const xs = Array.from({length: N}, (_, i) => xmin + (xmax - xmin) * i / (N - 1));
  const dx = xs[1] - xs[0];

  function normpdf(mu, sig) {
    return xs.map(v => Math.exp(-0.5 * ((v - mu) / sig) ** 2) / (sig * Math.sqrt(2 * Math.PI)));
  }
  function klScalar(p, q) {
    let s = 0;
    for (let i = 0; i < N; i++) if (p[i] > 1e-12) s += p[i] * Math.log(p[i] / (q[i] + 1e-12)) * dx;
    return Math.max(0, s);
  }

  const plotDiv = document.getElementById('kl-plot');

  function update() {
    const mu_p  = +document.getElementById('mu_p').value;
    const sig_p = +document.getElementById('sig_p').value;
    const mu_q  = +document.getElementById('mu_q').value;
    const sig_q = +document.getElementById('sig_q').value;
    const ragOn = document.getElementById('rag-toggle').checked;
    const lam   = ragOn ? +document.getElementById('rag-lambda').value : 0;

    document.getElementById('lbl-mu_p').textContent  = mu_p.toFixed(1);
    document.getElementById('lbl-sig_p').textContent = sig_p.toFixed(1);
    document.getElementById('lbl-mu_q').textContent  = mu_q.toFixed(1);
    document.getElementById('lbl-sig_q').textContent = sig_q.toFixed(1);
    document.getElementById('lbl-lambda').textContent = lam.toFixed(2);

    const p  = normpdf(mu_p, sig_p);
    const q  = normpdf(mu_q, sig_q);

    const mu_qr  = mu_q  + lam * (mu_p  - mu_q);
    const sig_qr = sig_q + lam * (sig_p - sig_q);
    const qr     = normpdf(mu_qr, sig_qr);

    const kl_pq_pt = xs.map((_, i) => p[i]  > 1e-12 ? p[i]  * Math.log(p[i]  / (q[i]  + 1e-12)) : 0);
    const kl_qp_pt = xs.map((_, i) => q[i]  > 1e-12 ? q[i]  * Math.log(q[i]  / (p[i]  + 1e-12)) : 0);
    const kl_rp_pt = xs.map((_, i) => p[i]  > 1e-12 ? p[i]  * Math.log(p[i]  / (qr[i] + 1e-12)) : 0);

    const KL_PQ  = klScalar(p,  q).toFixed(4);
    const KL_QP  = klScalar(q,  p).toFixed(4);
    const KL_RAG = klScalar(p, qr).toFixed(4);

    Plotly.restyle(plotDiv, { y: [p, q, qr, kl_pq_pt, kl_qp_pt, kl_rp_pt] }, [0, 1, 2, 3, 4, 5]);
    Plotly.restyle(plotDiv, {
      name: [
        "P : true distribution",
        "Q = f(x|\u03b8) : base model",
        "F(x|\u03b8,c) : RAG-augmented",
        `P\u00b7log(P/Q)  \u2192  D_KL(P\u2016Q) = ${KL_PQ}`,
        `Q\u00b7log(Q/P)  \u2192  D_KL(Q\u2016P) = ${KL_QP}`,
        `P\u00b7log(P/F)  \u2192  D_KL(P\u2016F) = ${KL_RAG}`,
      ],
      visible: [true, true, ragOn ? true : "legendonly", true, true, ragOn ? true : "legendonly"],
    }, [0, 1, 2, 3, 4, 5]);
  }

  document.getElementById('rag-toggle').addEventListener('change', function () {
    document.getElementById('rag-lambda').disabled = !this.checked;
    document.getElementById('lbl-lambda').style.color = this.checked ? '#39ff14' : '#8b949e';
    update();
  });

  ['mu_p', 'sig_p', 'mu_q', 'sig_q', 'rag-lambda'].forEach(id =>
    document.getElementById(id).addEventListener('input', update)
  );
})();
</script>
